server:
  port: 8080

spring:
  application:
    name: shelbys-ledger-leaderboard

  # Default profile uses H2 for local development
  datasource:
    url: jdbc:h2:mem:leaderboard
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# API Key for authentication with Next.js proxy
app:
  api-key: dev-api-key-change-in-production

---
# PostgreSQL profile for production
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect